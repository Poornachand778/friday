# Interview Topics for Friday AI Training Data Collection
# ======================================================
#
# Each topic contains subtopics for focused interviews.
# Run ~10 sessions per subtopic for comprehensive coverage.

# PERSONA & BELIEFS (Target: 800 examples)
persona:
  name: "Personality & Core Beliefs"
  target_examples: 200
  subtopics:
    - life_philosophy
    - core_values
    - decision_making
    - strengths_weaknesses
  starter: "Let's explore your personality and what drives you as a person."
  sample_questions:
    - "What's a belief you hold that most people would disagree with?"
    - "How do you handle situations where your values conflict?"
    - "What's the most important lesson life has taught you?"

relationships:
  name: "Relationships & Social Dynamics"
  target_examples: 200
  subtopics:
    - friendship
    - family
    - professional
    - trust
  starter: "Let's talk about how you approach relationships and connections."
  sample_questions:
    - "What makes someone a true friend in your view?"
    - "How do you handle conflict in close relationships?"
    - "What's your approach to maintaining long-distance relationships?"

beliefs:
  name: "Deep Beliefs & Worldview"
  target_examples: 200
  subtopics:
    - spirituality
    - meaning_of_life
    - ethics
    - future_outlook
  starter: "Let's explore your deeper beliefs about life and existence."
  sample_questions:
    - "What do you think happens after death?"
    - "How do you define success?"
    - "What gives your life meaning?"

humor:
  name: "Humor & Playfulness"
  target_examples: 200
  subtopics:
    - comedy_style
    - jokes
    - sarcasm
    - playful_banter
  starter: "Let's have some fun and explore your sense of humor."
  sample_questions:
    - "What kind of humor do you find most enjoyable?"
    - "Tell me about the funniest thing that happened to you recently."
    - "How do you use humor in difficult situations?"

# FILM & STORYTELLING (Target: 600 examples)
film_narrative:
  name: "Narrative & Story Structure"
  target_examples: 150
  subtopics:
    - story_structure
    - plot_development
    - conflict
    - resolution
  starter: "Let's discuss your approach to crafting narratives."
  sample_questions:
    - "What makes a story compelling to you?"
    - "How do you approach building tension in a narrative?"
    - "What's your view on subverting audience expectations?"

film_characters:
  name: "Character Development"
  target_examples: 150
  subtopics:
    - character_arcs
    - dialogue
    - motivation
    - flaws
  starter: "Let's explore how you create and develop characters."
  sample_questions:
    - "How do you make a villain sympathetic?"
    - "What's your process for writing authentic dialogue?"
    - "How do you handle character transformation?"

telugu_cinema:
  name: "Telugu Cinema Industry"
  target_examples: 150
  subtopics:
    - industry_dynamics
    - audience_preferences
    - commercial_vs_art
    - regional_identity
  starter: "Let's talk about Telugu cinema and its unique characteristics."
  sample_questions:
    - "What sets Telugu cinema apart from other industries?"
    - "How do you balance commercial appeal with artistic vision?"
    - "What trends in Telugu cinema excite or concern you?"

direction:
  name: "Direction & Vision"
  target_examples: 150
  subtopics:
    - visual_style
    - working_with_actors
    - technical_decisions
    - creative_process
  starter: "Let's discuss your directorial vision and process."
  sample_questions:
    - "How do you develop a visual language for a film?"
    - "What's your approach to working with actors?"
    - "How do you handle creative disagreements on set?"

