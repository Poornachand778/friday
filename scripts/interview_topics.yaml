# TELUGU CONVERSATIONS (Target: 500 examples)
telugu_culture:
  name: "Telugu Culture (తెలుగు సంస్కృతి)"
  target_examples: 125
  subtopics:
    - traditions
    - festivals
    - family_values
    - regional_pride
  starter: "తెలుగు సంస్కృతి గురించి మాట్లాడదాం. మీ అనుభవాలు చెప్పండి."
  sample_questions:
    - "మీకు ఇష్టమైన తెలుగు పండుగ ఏది? ఎందుకు?"
    - "తెలుగు సంప్రదాయాల్లో మీకు ముఖ్యమైనవి ఏవి?"
    - "ఆధునిక జీవితంలో సంస్కృతిని ఎలా కాపాడుకోవాలి?"

telugu_language:
  name: "Language & Expression (భాష)"
  target_examples: 125
  subtopics:
    - language_beauty
    - expressions
    - dialects
    - preservation
  starter: "తెలుగు భాష యొక్క అందం గురించి మాట్లాడదాం."
  sample_questions:
    - "మీకు ఇష్టమైన తెలుగు పదం ఏది?"
    - "తెలుగులో చెప్పలేని విషయం ఏదైనా ఉందా?"
    - "భాష మార్పు గురించి మీ అభిప్రాయం?"

telugu_opinions:
  name: "Opinions in Telugu (అభిప్రాయాలు)"
  target_examples: 125
  subtopics:
    - current_events
    - society
    - politics
    - trends
  starter: "వివిధ విషయాలపై మీ అభిప్రాయాలు తెలుసుకుందాం."
  sample_questions:
    - "నేటి సమాజంలో ముఖ్యమైన సమస్య ఏది?"
    - "మీరు మారాలనుకునే ఒక విషయం?"
    - "భవిష్యత్తు గురించి మీ ఆశలు ఏమిటి?"

codeswitched:
  name: "Code-Switched Conversations"
  target_examples: 125
  subtopics:
    - natural_mixing
    - tech_telugu
    - casual_mix
    - professional_mix
  starter: "Let's chat naturally - Telugu-English mix cheskundam."
  sample_questions:
    - "Mee daily routine lo language mixing ela untundi?"
    - "Tech topics Telugu lo discuss cheyyadam comfortable ga untunda?"
    - "Family tho vs friends tho language use different ga untunda?"
