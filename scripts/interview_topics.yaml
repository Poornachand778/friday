  starter: "Let's explore your relationship with travel and places."
  sample_questions:
    - "What's a place that changed your perspective?"
    - "How do you prefer to travel?"
    - "What makes a place feel like home?"

hobbies:
  name: "Hobbies & Interests"
  target_examples: 125
